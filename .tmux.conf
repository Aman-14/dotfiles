set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color*:Tc,xterm-ghostty*:Tc"
set -g default-shell /bin/zsh

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

set -s escape-time 10
set -gq allow-passthrough on
set -g set-clipboard on
set -g focus-events on
set -g detach-on-destroy off       # don't drop out of tmux when the last session dies
set -g renumber-windows on         # close a window, keep indices contiguous
set -g history-limit 1000000       # 1M-line scrollback

# unbind savin
unbind C-s

# set | to split window horizontally 
unbind %
bind | split-window -h -c "#{pane_current_path}"

# set - to split window vertically
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# reload tmux
unbind r
bind r source-file ~/.tmux.conf

# resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximuse a pane
bind -r m resize-pane -Z

# use c-l to clear screen
bind C-l send-keys 'C-l'

# enable mouse 
set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

bind-key s display-popup -E -w 90 -h 25 -T ' 🌐 SSH Manager ' 'sh ~/scripts/tmux-ssh.sh'

# Sesh: fuzzy-jump to any repo/session
bind-key o display-popup -E -w 60% -h 55% -T ' ⚡ Sesh ' '~/scripts/tmux-sesh-picker.sh'
bind-key T display-popup -E -w 60% -h 55% -T ' ⚡ Sesh ' '~/scripts/tmux-sesh-picker.sh'
bind-key O display-popup -E -w 60% -h 55% -T ' 🔄 Sesh (refresh) ' '~/scripts/tmux-sesh-picker.sh --refresh'
bind-key L run-shell 'sesh last'

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# Toggle between window 0 (editor) and window 1 (terminal).
# If window 1 doesn't exist, select-window -t :1 silently fails and we stay put.
bind -n M-f if-shell -F '#{==:#{window_index},0}' 'select-window -t :1' 'select-window -t :0'

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'
# set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
# set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g @themepack 'powerline/default/cyan'

# set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
